server.port=${PORT:8080}

# Database - Railway provides these automatically
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Frontend URL for CORS
frontend.url=${FRONTEND_URL}

# Groq AI
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Email (Resend in production, SMTP blocked on Railway)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Resend HTTP API
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:Media Luna <onboarding@resend.dev>}

# VAPID Keys for Web Push
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
vapid.subject=mailto:medialuna@gmail.com

# Meta/Facebook Graph API
meta.app.id=${META_APP_ID:DISABLED}
meta.app.secret=${META_APP_SECRET:DISABLED}
meta.page.access.token=${META_PAGE_TOKEN:DISABLED}
meta.page.id=${META_PAGE_ID:DISABLED}
meta.instagram.business.id=${META_IG_BUSINESS_ID:DISABLED}

# Weekly Sales Report Schedule
report.weekly.day=${REPORT_DAY:SUNDAY}
report.weekly.hour=${REPORT_HOUR:21}
report.owner.phone=${REPORT_PHONE:0000000000}
report.owner.email=${REPORT_EMAIL:medialuna.frutibar@gmail.com}
admin.email=${ADMIN_EMAIL:medialuna.frutibar@gmail.com}

# Enable scheduling
spring.task.scheduling.pool.size=2

# Gemini API
gemini.api.key=${GEMINI_API_KEY}

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=120MB

# Cloudinary (cloud image storage)
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# Mercado Pago
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY}

# Logging
logging.level.root=INFO
logging.level.com.medialuna.snackbar=INFO

# Sentry Error Tracking
sentry.dsn=${SENTRY_DSN}
sentry.environment=production
sentry.traces-sample-rate=0.3
sentry.send-default-pii=false