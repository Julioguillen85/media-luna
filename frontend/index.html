<!doctype html>
<html lang="en">

<head>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Media Luna" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Media Luna Snack Bar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:red;color:white;padding:20px;z-index:9999;position:fixed;top:0;left:0;width:100%;font-size:14px;word-break:break-all;';
            errDiv.innerHTML = '<strong>JS Error:</strong> ' + message + '<br>Line: ' + lineno;
            document.body.appendChild(errDiv);
            return false;
        };
        window.onunhandledrejection = function (event) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:orange;color:white;padding:20px;z-index:9999;position:fixed;top:80px;left:0;width:100%;font-size:14px;word-break:break-all;';
            errDiv.innerHTML = '<strong>Promise Error:</strong> ' + (event.reason ? event.reason.message : 'Unknown rejection');
            document.body.appendChild(errDiv);
        };
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
